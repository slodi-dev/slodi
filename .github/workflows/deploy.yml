name: Deploy to Production

on:
  workflow_run:
    workflows:
      - "Backend CI"
      - "Frontend CI"
    branches:
      - main
    types:
      - completed

jobs:
  check-both-ci:
    name: Verify all CI passed
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    outputs:
      should_deploy: ${{ steps.check.outputs.should_deploy }}
    steps:
      - name: Check all required workflows passed
        id: check
        uses: actions/github-script@v7
        with:
          script: |
            const sha = context.payload.workflow_run.head_sha;
            const requiredWorkflows = ['Backend CI', 'Frontend CI'];
            let allPassed = true;

            // List all check suites for this commit to find workflow conclusions
            const runs = await github.rest.actions.listWorkflowRunsForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              head_sha: sha,
              status: 'completed',
            });

            for (const name of requiredWorkflows) {
              const run = runs.data.workflow_runs.find(
                r => r.name === name && r.head_sha === sha && r.conclusion === 'success'
              );
              if (!run) {
                console.log(`${name}: not found or not successful for SHA ${sha}`);
                allPassed = false;
              } else {
                console.log(`${name}: success`);
              }
            }
            core.setOutput('should_deploy', allPassed ? 'true' : 'false');

  deploy:
    name: Deploy to Azure VM
    needs: check-both-ci
    runs-on: ubuntu-latest
    if: ${{ needs.check-both-ci.outputs.should_deploy == 'true' }}
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.AZURE_VM_IP }}
          username: ${{ secrets.AZURE_VM_USER }}
          key: ${{ secrets.AZURE_SSH_KEY }}
          script: |
            cd ~/slodi
            git pull origin main
            docker compose -f docker-compose.yml up -d --build
            docker image prune -f
      - name: Notify Discord
        if: always()
        uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK_URL }}
          status: ${{ job.status }}
          title: "Deploy to Production"
          description: "Commit: `${{ github.event.workflow_run.head_sha }}`"
