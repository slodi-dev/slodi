<!--
  SLÓÐI EMAIL TEMPLATE — DESIGN TOKEN MAPPING
  This file uses hardcoded hex values because email clients cannot render CSS variables.
  All values below correspond to Slóði sl- design tokens. If a token value changes in
  slodi-tokens.css, update this file and all child templates to match, and update TOKEN_MAP.md.

  --sl-color-primary        → #35a65f  (CTA buttons, links)
  --sl-color-secondary      → #2f7d5e  (header background)
  --sl-color-background     → #fafafa  (outer background)
  --sl-color-text-primary   → #262626  (body text)
  --sl-color-text-secondary → #6b7280  (footer, captions)
  --sl-color-border         → #d9d9d9  (dividers, borders)
  --sl-color-surface        → #f2f2f2  (footer background)
-->
<!DOCTYPE html>
<html lang="is" xmlns="http://www.w3.org/1999/xhtml" xmlns:v="urn:schemas-microsoft-com:vml" xmlns:o="urn:schemas-microsoft-com:office:office">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="color-scheme" content="light dark">
  <meta name="supported-color-schemes" content="light dark">
  <title>{% block title %}Slóði{% endblock %}</title>
  <!--[if mso]>
  <noscript>
    <xml>
      <o:OfficeDocumentSettings>
        <o:PixelsPerInch>96</o:PixelsPerInch>
      </o:OfficeDocumentSettings>
    </xml>
  </noscript>
  <![endif]-->
  <style>
    body {
      margin: 0;
      padding: 0;
      width: 100% !important;
      -webkit-text-size-adjust: 100%;
      -ms-text-size-adjust: 100%;
    }
    table {
      border-collapse: collapse;
      mso-table-lspace: 0pt;
      mso-table-rspace: 0pt;
    }
    img {
      border: 0;
      outline: none;
      text-decoration: none;
      -ms-interpolation-mode: bicubic;
    }
    a {
      color: #35a65f;
      text-decoration: underline;
    }
    .body-text {
      font-family: 'Roboto Condensed', Arial, Helvetica, sans-serif;
      font-size: 16px;
      line-height: 24px;
      color: #262626;
    }
    .footer-text {
      font-family: 'Roboto Condensed', Arial, Helvetica, sans-serif;
      font-size: 13px;
      line-height: 20px;
      color: #6b7280;
    }
    .heading {
      font-family: 'Roboto Condensed', Arial, Helvetica, sans-serif;
      font-size: 24px;
      line-height: 32px;
      font-weight: 700;
      color: #262626;
    }
  </style>
</head>
<body style="margin: 0; padding: 0; width: 100% !important; background-color: #fafafa;">

<!-- Outer wrapper table -->
<table role="presentation" cellpadding="0" cellspacing="0" border="0" width="100%" bgcolor="#fafafa" style="background-color: #fafafa;">
  <tr>
    <td align="center" style="padding-top: 24px; padding-bottom: 24px; padding-left: 0; padding-right: 0;">

      <!-- Main container -->
      <table role="presentation" cellpadding="0" cellspacing="0" border="0" width="600" style="max-width: 600px; width: 600px;">

        <!-- Header -->
        <tr>
          <td align="center" bgcolor="#2f7d5e" style="background-color: #2f7d5e; padding-top: 20px; padding-bottom: 20px; padding-left: 20px; padding-right: 20px;">
            <a href="https://slodi.is" target="_blank" style="text-decoration: none;">
              <img src="https://slodi.is/logo/slodi-simple-vector-white.png" alt="Slóði" width="140" height="48" style="display: block; width: 140px; height: 48px;">
            </a>
          </td>
        </tr>

        <!-- Content -->
        <tr>
          <td bgcolor="#ffffff" style="background-color: #ffffff; padding-top: 32px; padding-bottom: 32px; padding-left: 40px; padding-right: 40px;">
            {% block content %}{% endblock %}
          </td>
        </tr>

        <!-- Footer -->
        <tr>
          <td bgcolor="#f2f2f2" style="background-color: #f2f2f2; padding-top: 24px; padding-bottom: 24px; padding-left: 40px; padding-right: 40px;">
            <table role="presentation" cellpadding="0" cellspacing="0" border="0" width="100%">
              <tr>
                <td align="center" class="footer-text" style="font-family: 'Roboto Condensed', Arial, Helvetica, sans-serif; font-size: 13px; line-height: 20px; color: #6b7280;">
                  <a href="https://slodi.is" style="color: #6b7280; text-decoration: underline;">slodi.is</a>
                  {% block unsubscribe %}{% endblock %}
                </td>
              </tr>
              <tr>
                <td align="center" class="footer-text" style="font-family: 'Roboto Condensed', Arial, Helvetica, sans-serif; font-size: 13px; line-height: 20px; color: #6b7280; padding-top: 8px;">
                  &copy; {{ copyright|default("2026 Slodi ehf.") }}
                </td>
              </tr>
            </table>
          </td>
        </tr>

      </table>
      <!-- /Main container -->

    </td>
  </tr>
</table>
<!-- /Outer wrapper table -->

</body>
</html>
